<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // SPA fallback: redirect all 404s to the main app with the path preserved
    // This allows React Router to handle the route (including legacy redirects)
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Check if this is a legacy /location/* URL that needs redirecting
      var locationMatch = path.match(/^\/location\/?(.*)$/);
      if (locationMatch) {
        // Perform 301-like redirect to /locations/*
        var remainingPath = locationMatch[1].replace(/\/+$/, '');
        var newUrl = '/locations/' + remainingPath + (remainingPath ? '/' : '') + search + hash;
        
        // Use replace to not add to history (mimics 301 behavior)
        window.location.replace(newUrl);
        return;
      }
      
      // For other 404s, redirect to the SPA root with the path encoded
      // This lets React Router show a proper 404 page
      var redirectUrl = '/?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
